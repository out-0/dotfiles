# 1. Environment Setup (Must be first for D-Bus/Portals to work)
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# 2. Authentication & Core Services
# Combined the duplicates and added &
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1 &
exec-once = /usr/bin/dunst &

# 3. UI Components
exec-once = hypridle &
exec-once = swww-daemon &
exec-once = waybar &
exec-once = quickshell &
exec-once = qs -p ~/.config/quickshell/overview/shell.qml

# 4. Network & Tray Apps
# Added & to prevent nm-applet from blocking the login sequence
exec-once = nm-applet --indicator &

# To start a emacs server to precise the session
# needed for emacsclinet
exec-once = emacs --daemon

# ============================================================
# HYPRLAND WINDOW RULES (NEW SYNTAX)
# ============================================================

# --- TERMINALS ---
windowrule {
    name = terminal-settings
    match:class = ^(Alacritty|kitty|foot|wezterm)$
    opacity = 1.0 1.0
    float = off
	size = (monitor_w*1) (monitor_h*1)
	#rounding = 15
	center = on
	#size = 50% 50%
}

# Emacs window
windowrule {
    name = emacs-settings
    match:class = ^(EmacsTerminal|Emacs)$
    opacity = 0.80 0.80
	#float = off
	size = (monitor_w*1) (monitor_h*1)
	rounding = 0
	center = on
	#size = 50% 50%
}

# Windsurf window
windowrule {
    name = windsurf-settings
    match:class = ^(windsurf|Windsurf)$
    opacity = 0.80 0.80
	rounding = 0
}
# --- BROWSERS ---
windowrule {
    name = browser-settings
    match:class = ^(LibreWolf|librewolf|[Ff]irefox.*|[Bb]rave|Brave-browser)$
    opacity = 0.90 0.90
    float = off
	center = on
}

# --- CODE EDITORS ---
windowrule {
    name = code-settings
    match:class = ^(code-oss|codium|VSCodium|jetbrains-.+)$
    opacity = 1.0 0.9
}

# --- INSTANT MESSAGING ---
windowrule {
    name = im-settings
    match:class = ^(Discord|discord|WebCord|Ferdium|Whatsapp-for-linux|ZapZap|org.telegram.desktop)$
    float = off
	#size = 70% 70%
    opacity = 0.95 0.85
}

# --- SYSTEM SETTINGS & UTILS ---
windowrule {
    name = system-utils
    match:class = ^(pavucontrol|blueman-manager|nm-connection-editor|qt5ct|qt6ct|gnome-disks|org.gnome.Calculator)$
    float = on
    size = 70% 70%
}

# --- MEDIA & VIEWERS ---
windowrule {
    name = media-viewers
    match:class = ^(mpv|com.github.rafostar.Clapper|org.gnome.Evince|spotify|Spotify)$
    float = off
	size = 10% 10%
    center = off
    opacity = 0.80 0.85
}

# --- DIALOGS & POPUPS ---
windowrule {
    name = popups
    match:title = ^(Save As|Open Files|Add Folder to Workspace|Picture-in-Picture|Authentication Required)$
    float = on
    center = on
    pin = on
}

# --- YAZI FILE MANAGER ---
windowrule {
    name = yazi-window
    match:class = ^(yazi-float)$
    float = off
    opacity = 0.85 0.80
}

# --- SPECIAL OVERRIDES ---
windowrule = match:title ^(Picture-in-Picture)$, keep_aspect_ratio on

# --- LAYER RULES (Rofi & Notifications) ---
layerrule = blur on, match:namespace ^(rofi|notifications)$
layerrule = ignore_alpha 0.5, match:namespace ^(rofi|notifications)$

# Hyprland configuration

# Source config files
source = ~/.config/hypr/config/monitors.conf
source = ~/.config/hypr/config/autostart.conf
source = ~/.config/hypr/config/env_variables.conf
source = ~/.config/hypr/config/keybindings.conf
source = ~/.config/hypr/config/windowrules.conf

#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 5
    gaps_out = 2

    border_size = 2

    # https://wiki.hyprland.org/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgba(ffffffff)
    col.inactive_border = rgba(ffffffaa)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = true

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

#--decoration---------------------------------------------------
# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
  rounding = 0 # radious
  active_opacity = 1
  inactive_opacity = 1

    blur {
      enabled = true
      size = 3
      passes = 2
      ignore_opacity = false
      popups = true
      new_optimizations = true
      noise = 0.0200
      contrast = 1
      brightness = 1
      #vibrancy = 0.1696
    }

  shadow {
    enabled = false
    range = 0
    render_power = 1
    #color = rgba(000000b3)
	color = rgba(cba6f7ee)     # Matching the purple border (with some transparency)
	color_inactive = rgba(1e1e2eaa) # Optional: dark glow for inactive windows
    ignore_window = true
  }
}
# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    enabled = yes
}

# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc {
    force_default_wallpaper = 0 # -1 Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
}


#############
### INPUT ###
#############

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = us,ara
    #dkb_variant = ,
    kb_options = grp:win_space_toggle # This is triggring the lancher also so must be modified to super alt

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
    accel_profile = flat
    touchpad {
        natural_scroll = true
    }
}

